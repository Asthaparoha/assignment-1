<!DOCTYPE html>
<html>
<head>
<title>Manage Menu - FoodieFlow</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="navbar">
  <div class="logo">FoodieFlow 🍔</div>
  <div class="nav-actions">
    <button onclick="go('owner.html')">Dashboard</button>
  </div>
</div>

<div class="home-hero">
  <h1>Manage Menu</h1>
  <p>Add and manage food items</p>
</div>

<div class="owner-layout">

  <!-- LEFT FORM -->
  <div class="form-section">

    <h3 id="formTitle">Add Menu Item</h3>

    <select id="restaurantSelect" onchange="loadCategories()">
        <option value="">Select Restaurant</option>
    </select>

    <select id="categorySelect" onchange="loadMenu()">
        <option value="">Select Category</option>
    </select>

    <input id="name" placeholder="Item Name">
    <input id="price" placeholder="Price">

    <button class="primary" onclick="saveMenu()">Save</button>

  </div>

  <!-- RIGHT LIST -->
  <div class="list-section" id="list"></div>

</div>

<script>
function go(p){window.location.href=p;}
</script>

<script src="js/owner-menu.js"></script>

</body>
</html>
